---
version: "3.9"

services:
  devopsdb:
    container_name: devopsdb
    image: dbimage
    ports:
      - "3306:3306"
    networks:
      - mynetwork

  application:
    container_name: appcontainer
    image: appimage
    ports:
      - "1234:8080"
    networks:
      - mynetwork
    depends_on:
      - devopsdb

networks:
  mynetwork:
    driver: overlay
